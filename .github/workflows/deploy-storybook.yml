name: Deploy Storybook

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'src/e2e/**'
  workflow_dispatch:

concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: bun run lint-all

      - name: Unit Tests
        run: bun run test:unit

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

#      - name: Install Playwright browsers
#        run: bunx playwright install --with-deps

#      - name: Run Playwright tests
#        run: bun run test:e2e:ci

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: bun run build-storybook

      - name: Deploy to Storybook repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DESIGN_SYSTEM_STORYBOOK }}
          external_repository: ngphanducthinh/7pmlabs-design-system
          publish_dir: ./storybook-static
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: update storybook (${{ github.sha }})'
