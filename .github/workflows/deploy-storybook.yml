name: Deploy Storybook

on:
  push:
    branches: [main]
    paths:
      - '.storybook/**'
      - 'src/stories/**'
  workflow_dispatch:
    inputs:
      run-e2e:
        description: 'Run E2E tests after deploy'
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run Storybook tests
        run: bun run test:storybook

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [storybook-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: bun run build-storybook -- --base-path=/7pmlabs-design-system/

      - name: Checkout Storybook repository
        uses: actions/checkout@v6
        with:
          repository: ngphanducthinh/7pmlabs-design-system
          token: ${{ secrets.DESIGN_SYSTEM_STORYBOOK }}
          path: 7pmlabs-design-system

      - name: Copy Built Files
        run: cp -R storybook-static/* 7pmlabs-design-system/

      - name: Commit and Push Changes
        run: |
          cd 7pmlabs-design-system
          git config user.email "ngphanducthinh@gmail.com"
          git config user.name "Thinh Nguyen"
          git add .
          git commit -m "deploy: update storybook (${{ github.sha }})" || echo "No changes to commit"
          git push

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event.inputs.run-e2e != 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
