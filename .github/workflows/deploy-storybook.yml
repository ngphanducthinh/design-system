#        uses: actions/upload-artifact@v4
#        if: ${{ !cancelled() }}
#        with:
#          name: playwright-report
#          path: playwright-report/
#          retention-days: 14

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
#    needs: [quality, e2e]
    needs: [quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: bun run build-storybook

      - name: Checkout Storybook repository
        uses: actions/checkout@v4
        with:
          repository: ngphanducthinh/7pmlabs-design-system
          token: ${{ secrets.DESIGN_SYSTEM_STORYBOOK }}
          path: 7pmlabs-design-system

      - name: Copy Built Files
        run: cp -R storybook-static/* 7pmlabs-design-system/

      - name: Commit and Push Changes
        run: |
          cd 7pmlabs-design-system
          git config user.email "ngphanducthinh@gmail.com"
          git config user.name "Thinh Nguyen"
          git add .
          git commit -m "deploy: update storybook (${{ github.sha }})" || echo "No changes to commit"
          git push
