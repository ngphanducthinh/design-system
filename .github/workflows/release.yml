name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version bump type (patch | minor | major)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: false
    outputs:
      new-version:
        description: 'The newly published @7pmlabs/design-system version (e.g. 2.0.6)'
        value: ${{ jobs.publish.outputs.new-version }}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build library
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    name: Publish v${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write  # required for npm OIDC trusted publishing
    outputs:
      new-version: ${{ steps.version.outputs.new }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install latest npm
        run: sudo npm install -g npm@latest

      - name: Verify npm supports OIDC trusted publishing
        run: npm --version  # must be >= 11.5.1

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Determine new version
        id: version
        run: |
          current=$(npm view @7pmlabs/design-system version 2>/dev/null || echo "0.0.0")
          echo "current=$current" >> $GITHUB_OUTPUT

          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.version }}" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="${major}.$((minor + 1)).0" ;;
            patch) new="${major}.${minor}.$((patch + 1))" ;;
          esac
          echo "new=$new" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.new }} --no-git-tag-version

      - name: Publish to NPM
        if: ${{ !inputs.dry-run }}
        run: npm publish --access public --tag latest

      - name: Commit version bump and create git tag
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`@7pmlabs/design-system\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | \`${{ steps.version.outputs.current }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New | \`${{ steps.version.outputs.new }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump | \`${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | \`${{ inputs.dry-run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
