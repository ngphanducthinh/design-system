name: Release Nuxt Module

# Reusable: invoked by release-all.yml. Not directly dispatchable — the
# orchestrator is the only entry point so npm trusted publishing sees a
# consistent caller workflow ref.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version bump type (patch | minor | major)'
        required: true
        type: string
      design-system-version:
        description: 'Version of @7pmlabs/design-system to depend on. Empty falls back to the latest published version.'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-nuxt
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build main library (required for module's local dep)
        run: bun run build:lib

      - name: Sync built lib into Nuxt module's nested node_modules
        # The Setup step may restore a stale `file:../..` snapshot from cache (bun's
        # --frozen-lockfile won't refresh file: deps). Bun may also resolve the dep
        # as a symlink back to the project root — which would make `cp` complain
        # about copying a file to itself. Drop whatever is there and lay down a
        # fresh snapshot directory with the just-built `dist/`.
        run: |
          DEST=packages/design-system-nuxt/node_modules/@7pmlabs/design-system
          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp package.json "$DEST/package.json"
          cp -R dist "$DEST/dist"
        shell: bash

      - name: Prepare Nuxt module (.nuxt types)
        run: bun run dev:prepare
        working-directory: packages/design-system-nuxt

      - name: Build Nuxt module
        run: bun run build
        working-directory: packages/design-system-nuxt

      - name: Upload Nuxt module build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-nuxt
          path: packages/design-system-nuxt/dist/
          retention-days: 1

  publish:
    name: Publish nuxt v${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write  # required for npm OIDC trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install latest npm
        run: sudo npm install -g npm@latest

      - name: Verify npm supports OIDC trusted publishing
        run: npm --version  # must be >= 11.5.1

      - name: Download Nuxt module build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-nuxt
          path: packages/design-system-nuxt/dist/

      - name: Determine new version and design-system dep
        id: version
        run: |
          current=$(npm view @7pmlabs/design-system-nuxt version 2>/dev/null || echo "0.0.0")
          echo "current=$current" >> $GITHUB_OUTPUT

          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.version }}" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="${major}.$((minor + 1)).0" ;;
            patch) new="${major}.${minor}.$((patch + 1))" ;;
          esac
          echo "new=$new" >> $GITHUB_OUTPUT

          ds_input="${{ inputs.design-system-version }}"
          if [ -z "$ds_input" ]; then
            ds_version=$(npm view @7pmlabs/design-system version 2>/dev/null || echo "")
            if [ -z "$ds_version" ]; then
              echo "Could not resolve a published @7pmlabs/design-system version."
              exit 1
            fi
          else
            ds_version="$ds_input"
            # Verify the requested version actually exists on npm
            if ! npm view @7pmlabs/design-system@$ds_version version >/dev/null 2>&1; then
              echo "@7pmlabs/design-system@$ds_version is not available on npm."
              exit 1
            fi
          fi
          echo "design_system=$ds_version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Bump Nuxt module version and rewrite design-system dep
        working-directory: packages/design-system-nuxt
        run: |
          npm pkg set version=${{ steps.version.outputs.new }}
          npm pkg set dependencies.@7pmlabs/design-system='^${{ steps.version.outputs.design_system }}'
        shell: bash

      - name: Publish Nuxt module to NPM
        if: ${{ !inputs.dry-run }}
        working-directory: packages/design-system-nuxt
        # --ignore-scripts skips prepack so we publish the artifact we already built and verified.
        run: npm publish --access public --tag latest --ignore-scripts

      - name: Restore design-system dep to file:../..
        run: |
          node -e "
            const fs = require('fs');
            const path = 'packages/design-system-nuxt/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf-8'));
            pkg.dependencies['@7pmlabs/design-system'] = 'file:../..';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "
        shell: bash

      - name: Commit version bump and create git tag
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/design-system-nuxt/package.json
          git commit -m "chore: release design-system-nuxt v${{ steps.version.outputs.new }}"
          git tag "design-system-nuxt-v${{ steps.version.outputs.new }}"
          # Rebase onto the latest remote — release-all may have pushed the
          # design-system version-bump commit to the same branch while this
          # job was running, which would otherwise reject the push as
          # non-fast-forward.
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
          git push origin "design-system-nuxt-v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: design-system-nuxt-v${{ steps.version.outputs.new }}
          name: design-system-nuxt v${{ steps.version.outputs.new }}
          body: |
            `@7pmlabs/design-system-nuxt` `${{ steps.version.outputs.current }}` → `${{ steps.version.outputs.new }}`

            Depends on `@7pmlabs/design-system@^${{ steps.version.outputs.design_system }}`.
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### 📦 Nuxt Module Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`@7pmlabs/design-system-nuxt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | \`${{ steps.version.outputs.current }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New | \`${{ steps.version.outputs.new }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Depends on | \`@7pmlabs/design-system@^${{ steps.version.outputs.design_system }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump | \`${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | \`${{ inputs.dry-run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
