  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run Storybook tests
        run: bun run test:storybook

  build:
    name: Build
    runs-on: ubuntu-latest
#    needs: [lint, unit-tests, e2e-tests, storybook-tests]
    needs: [lint, unit-tests, storybook-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build library
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Summary
        run: |
          echo "### CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Storybook Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
